<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/aws-curriculum/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AWS CLF完全攻略ハンズオンカリキュラム。IT用語からVPC・EC2・S3・IAM・ECS・CloudFrontまで。" />
    <title>AWS CLF ハンズオンカリキュラム</title>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l){
        if(l.search[1]==='/' ){
          var decoded=l.search.slice(1).split('&').map(function(s){
            return s.replace(/~and~/g,'&')
          }).join('?');
          window.history.replaceState(null,null,
            l.pathname.slice(0,-1)+decoded+l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
